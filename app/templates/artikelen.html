<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Artikelen</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .article {
            margin-bottom: 25px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
   <p><a href="{{ url_for('cbs.index') }}">← Terug naar home</a></p>
   <p> <a href="{{ url_for('cbs.logout') }}">← Log uit</a></p>

    <main>
  {% for article in articles %}
        <div class="sectorA">
           <section class="Artikelen">

              <div class="ArtikelenChild">
                  <p class="ArtikelTitel">{{ article.Title }}</p>
                      <p class="ArtikelLeadText">
                          {{ article.LeadText }}
                      </p>
                  <br>
                <img src="{{ article.Image }}" alt="{{ article.ImageAlt }}">
                   <p>Taxonomy: {{article.TaxonomyTags}}</p>
                  <p>Themes: {{article.Themes}}</p>
              </div>
           </section>
        </div>
      {% endfor %}

    </main>
