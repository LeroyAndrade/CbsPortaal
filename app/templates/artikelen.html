<!-- app/templates/artikelen.html -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Artikelen</title>
</head>
<body>
    <a href="{{ url_for('main.index') }}">← Terug naar home</a>

    <section class="Artikelen">
         {% for article in articles %}
          <div class="ArtikelenChild">
              <p>{{ article.title }}</p>
              {% if article.url %}
                <img src="{{ article.url }}" alt="">
              {% endif %}
          </div>
        {% endfor %}
    </section>
</body>
</html>
