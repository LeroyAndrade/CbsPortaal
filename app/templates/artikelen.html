<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Artikelen</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .article {
            margin-bottom: 25px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
   <p><a href="{{ url_for('cbs.index') }}">← Terug naar home</a></p>
   <p><a href="{{ url_for('cbs.logout') }}">← Log uit</a></p>

    <main>
        <div class="sectorA">

           <section class="Artikelen">
             {% for article in articles %}
                  <article class="ArtikelenChild">
                      <div class="ArtikelTitel"><h1 class="">{{ article.Title }}</h1></div>
                          <br>
                          <div><h2><b>Themes:</b>   {{article.Themes}}</h2> </div>
                          <img src="{{ article.Image }}" alt="{{ article.ImageAlt }}">
                          <div class="taxonamy">Taxonomy: {{article.TaxonomyTags}}</div>
                      <p class="ArtikelLeadText ruim">
                              {{ article.LeadText }}
                          </p>
                  </article>
             {% endfor %}
           </section>

        </div>
    </main>


    <br><br>

        <section class="dropdown">
            <select id="datasetSelect">
                <!-- Data vanuit services -->
                {% for dd in dropdown %}
                    <option value="{{ dd }}">{{ dd }}</option>
                {% endfor %}
            </select>
        </section>


        <div id="result"></div>


        <script>
            document.addEventListener('DOMContentLoaded', () => {

                const loadData = async () => {

                    const dataset = document.getElementById('datasetSelect').value || 'Articles';
                    const resultDiv = document.getElementById('result');

                    resultDiv.innerHTML = '<p>Laden...</p>';

                    try {
                        const res = await fetch(`/cbs/data?dataset=${dataset}`);

                        // if error: toon
                        if (!res.ok) throw new Error('Netwerk fout ' + res);

                        // conv naar JSON
                        const items = await res.json();

                        // if niets teruggekregen
                        if (items.length === 0) {
                            resultDiv.innerHTML = '<p>Geen resultaten gevonden.</p>';
                            return;
                        }

                        // Bouw HTML lijst op
                        const topItems = items.slice(0, 10);

                        let html = '<div class="cbs-grid">';

                        topItems.forEach(item => {
                            const title = item.Title || item.Name || 'Geen titel';
                            const description = item.LeadText || item.Description || '';
                            const hasLink = item.Url;

                            html += `
                                <article class="cbs-card">
                                    <h3>${title}</h3>
                                    <p>${description}</p>
                                    ${hasLink ? `<a href="${item.Url}" target="_blank">Lees meer</a>` : ''}
                                </article>
                            `;
                        });

                        html += '</div>';

                        resultDiv.innerHTML = html;

                    } catch (err) {
                        console.error(err);
                        resultDiv.innerHTML = '<p class="error">Kon data niet ophalen. Probeer het later opnieuw.</p>';
                    }
                };

                loadData();
                // als dropdown value verandert, herladen value
                document.getElementById('datasetSelect').addEventListener('change', loadData);  // Herlaad bij dropdown wijzigen
            });
        </script>


    </body>
</html>
